<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bihar Hydro-Climatic Risk Atlas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container-fluid py-4">
        <header class="pb-3 mb-4 border-bottom">
            <span class="fs-4">🌍 Hydro-Climatic Risk Atlas | 30m Resolution</span>
            <p class="text-muted small mb-0">Developed by Ankit Kumar (IIT Kharagpur)</p>
        </header>

        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5>Analytical Parameters</h5>
                        <button onclick="runAnalysis()" class="btn btn-primary w-100">🚀 Run Analysis</button>
                    </div>
                </div>
                <div id="resultBox" class="alert alert-info d-none">
                    <strong>Results:</strong> <span id="areaText"></span> Hectares
                </div>
            </div>
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body bg-dark text-white text-center" style="height: 500px;">
                        [Map View Placeholder]
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function runAnalysis() {
            const res = await fetch('/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({region: 'Danapur'})
            });
            const data = await res.json();
            document.getElementById('resultBox').classList.remove('d-none');
            document.getElementById('areaText').innerText = data.flooded_area;
        }
    </script>
</body>
</html>
